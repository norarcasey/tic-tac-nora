name: Publish to npm

# Publishes @norarcasey/tic-tac-nora when a GitHub Release is published.
# Requires an NPM_TOKEN repository secret (an npm automation token with
# publish rights to the @norarcasey scope).
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "Release tag ($TAG) does not match package.json version ($PKG_VERSION)" >&2
            exit 1
          fi

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
